<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- Chart bars -->
  <rect x="80"  y="300" width="72" height="132" rx="8" fill="#1a56db" opacity="0.6"/>
  <rect x="176" y="230" width="72" height="202" rx="8" fill="#1a56db" opacity="0.8"/>
  <rect x="272" y="160" width="72" height="272" rx="8" fill="#1a56db"/>
  <rect x="368" y="110" width="72" height="322" rx="8" fill="#60a5fa"/>
  <!-- Trend line -->
  <polyline points="116,290 212,220 308,150 404,100"
    fill="none" stroke="#34d399" stroke-width="14"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot on trend -->
  <circle cx="404" cy="100" r="16" fill="#34d399"/>
  <!-- Top label text -->
  <text x="256" y="72" font-family="Arial,sans-serif" font-weight="700"
    font-size="48" fill="white" text-anchor="middle">ERP</text>
</svg>
